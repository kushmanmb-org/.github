name: "Kushmanmb Code Fix"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  code_fix:
    name: Automated Code Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f package.json ]; then
            npm ci --ignore-scripts || npm install || true
          else
            echo "No npm dependencies to install"
          fi

      - name: Run static analysis
        run: |
          # Install slither if not already available
          pip install slither-analyzer || true
          # Run slither if there are Solidity contracts
          if ls *.sol 1> /dev/null 2>&1 || [ -d contracts ]; then
            slither . || true
          else
            echo "No Solidity contracts found for analysis"
          fi

      - name: Run automated error detection
        run: |
          if [ -f scripts/detect-errors.js ]; then
            node scripts/detect-errors.js || true
          elif [ -f scripts/detect-errors.sh ]; then
            bash scripts/detect-errors.sh || true
          else
            echo "No automated error detection script found"
          fi

      - name: Run automated fixes
        run: |
          if [ -f scripts/fix-errors.js ]; then
            node scripts/fix-errors.js || true
          elif [ -f scripts/fix-errors.sh ]; then
            bash scripts/fix-errors.sh || true
          else
            echo "No automated fix script found"
          fi

      - name: Commit and push fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated code fixes by workflow"
          branch: ${{ github.ref_name }}
          commit_options: '--no-verify'
          file_pattern: '.'
